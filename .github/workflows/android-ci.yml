name: Build Debug APK (Full Log)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK with full stacktrace
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log

      - name: Upload build log if failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LUKS2FileManager-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error