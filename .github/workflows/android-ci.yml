name: Build APK (Full Auto)

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Force submodule update
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      # خطوة سحرية: تحمّل Gradle وتنشئ wrapper جديد بالكامل
      - name: Generate fresh Gradle Wrapper
        run: |
          # إذا كان هناك أي wrapper قديم، احذفه
          rm -rf gradle/wrapper gradlew gradlew.bat
          # تحميل Gradle 8.4
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip
          export PATH=$PWD/gradle-8.4/bin:$PATH
          # إنشاء wrapper جديد
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          # تأكيد وجود الملفات
          ls -l gradlew gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LUKS2Reader-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error