name: Android CI (Release APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate Release Keystore (temporary)
        run: |
          keytool -genkey -v \
            -keystore release-test.jks \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Test, OU=Test, O=Test, L=Test, S=Test, C=US" \
            -noprompt

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (with detailed logging)
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release-test.jks
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android
        run: ./gradlew assembleRelease --stacktrace --info

      - name: Verify build artifacts
        run: |
          if [ -d app/build ]; then
            echo "Build directory found"
            find app/build -type f -name "*.apk" || echo "No APK inside"
          else
            echo "❌ Build directory MISSING - check previous Gradle logs for errors"
            exit 1
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LUKS2FileManager-release
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error