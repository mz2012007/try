name: Build & Auto-Repair Wrapper

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f gradlew ] || [ ! -s gradlew ]; then
            echo "Wrapper missing, creating..."
            # تحميل Gradle مؤقتًا لإنشاء wrapper
            curl -s https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
            unzip -q gradle.zip
            export PATH=$PWD/gradle-8.4/bin:$PATH
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Build Debug APK with stacktrace
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LUKS2Reader-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error