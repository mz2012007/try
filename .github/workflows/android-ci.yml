name: Build Debug APK (Complete)

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      # ضمان أن الـ submodules محدثة بالكامل
      - name: Force submodule update
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Verify submodule folders exist
        run: |
          echo "argon2 contents:"
          ls -la argon2 2>/dev/null || echo "argon2 missing"
          echo "lwext4 contents:"
          ls -la lwext4 2>/dev/null || echo "lwext4 missing"

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LUKS2Reader-debug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error